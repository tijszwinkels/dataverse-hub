# Dataverse Hub configuration
# Copy to hub.toml and adjust as needed.
# Environment variables override values set here.

# "root" (authoritative) or "proxy" (cache + forward)
# mode = "proxy"

# Upstream hub URL (proxy mode only)
# upstream_url = "https://dataverse001.net"

# Listen address
# addr = ":5678"

# Object store directory
# store_dir = "./dataverse001"

# Rate limiting
# rate_limit_per_min = 120
# rate_limit_per_day = 20000

# PAGE ref used as default HTML viewer for browser requests
# default_viewer_ref = "AxyU5_5vWmP2tO_klN4UpbZzRsuJEvJTrdwdg_gODxZJ.b3f5a7c9-2d4e-4f60-9b8a-0c1d2e3f4a5b"

# Keep old revisions in bk/ on update
# backup_enabled = true

# Auth token / session cookie lifetime (Go duration string)
# auth_token_expiry = "168h"

# Base domain for virtual hosting (default: "localhost")
# Required for vhost_mode = "redirect" or "isolate".
# base_domain = "dataverse001.net"

# Virtual hosting mode:
# - "off": disable host-based routing and on-demand TLS approval
# - "redirect": resolve _dv.* hosts, but redirect browsers to the shared base-domain path
# - "isolate": give each PAGE its own canonical host/origin
# vhost_mode = "isolate"

# DNS TXT record cache TTL for custom domain resolution
# txt_cache_ttl = "5m"

# Shared realms — grant a group of pubkeys shared read access to objects.
# Realm names conventionally use "{owner-pubkey}.{Name}" but any string works.
# Edit and send SIGHUP to reload without restart.
#
# [realms."AxyU5_5vWmP2tO_klN4UpbZzRsuJEvJTrdwdg_gODxZJ.MyTeam"]
# members = [
#   "AxyU5_5vWmP2tO_klN4UpbZzRsuJEvJTrdwdg_gODxZJ",
#   "BzxY7_other_pubkey_here",
# ]
